name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install black flake8 isort
      - run: black --check .
      - run: flake8 . --max-line-length=100 --exclude=.venv,__pycache__
      - run: isort --check-only .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ --cov=. --cov-report=xml -q
        continue-on-error: true
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
        continue-on-error: true

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit pip-audit
      - run: bandit -r . -x .venv,tests --severity-level medium
      - run: pip-audit -r requirements.txt

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sales-horizon:test .
