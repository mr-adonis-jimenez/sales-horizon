name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
        uses: github/codeql-action/init@v4
  with:
    languages: javascript

    - name: Claude Code Action Official
    - uses: anthropics/claude-code-action@v1
